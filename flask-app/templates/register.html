<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J'Bistro - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('{{ url_for("static", filename="images/bg.png") }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow-y: auto;
        }
        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.2), rgba(0,0,0,0.4));
            z-index: 1;
        }
        .content-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="content-wrapper">
        <div class="flex flex-col items-center gap-5 text-center max-w-md w-full">
            <!-- Logo -->
            <img 
                src="{{ url_for('static', filename='images/plogo.png') }}" 
                alt="J'Bistro Logo" 
                class="w-56 md:w-64 drop-shadow-2xl"
            >

            <h1 class="text-5xl md:text-6xl font-extrabold text-white drop-shadow-2xl">J'Bistro</h1>
            <p class="text-lg font-semibold uppercase text-white drop-shadow-lg">RESTAURANT</p>

            <h2 class="text-3xl md:text-4xl font-bold text-white drop-shadow-2xl mt-4">Register to<br>J'Bistro</h2>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, msg in messages %}
                        <p class="{% if category == 'error' %}text-red-400{% else %}text-green-400{% endif %} font-medium mt-2">
                            {{ msg }}
                        </p>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- Register Form -->
            <div class="w-full rounded-3xl bg-[#f5e0c2]/90 p-8 shadow-2xl backdrop-blur-sm border border-amber-800/30 mt-6">
                <form method="POST" class="flex flex-col gap-5">
                    <div class="flex flex-col text-left">
                        <label class="mb-1.5 text-lg font-medium text-gray-800">Email</label>
                        <input type="email" name="email" required placeholder="example@email.com"
                               class="rounded-xl border border-amber-700/50 bg-white/70 px-5 py-3.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-600">
                    </div>
                    <div class="flex flex-col text-left">
                        <label class="mb-1.5 text-lg font-medium text-gray-800">Password</label>
                        <input type="password" name="password" required placeholder="Minimum 6 characters"
                               class="rounded-xl border border-amber-700/50 bg-white/70 px-5 py-3.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-600">
                    </div>
                    <div class="flex flex-col text-left">
                        <label class="mb-1.5 text-lg font-medium text-gray-800">Confirm Password</label>
                        <input type="password" name="confirm_password" required placeholder="Re-enter password"
                               class="rounded-xl border border-amber-700/50 bg-white/70 px-5 py-3.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-600">
                    </div>
                    <button type="submit" 
                            class="mt-3 rounded-xl bg-amber-800 py-3.5 px-10 text-xl font-bold text-white hover:bg-amber-900 transition">
                        Register
                    </button>
                </form>
            </div>

            <p class="mt-6 text-lg text-white">
                Already have an account? 
                <a href="{{ url_for('login') }}" class="text-amber-300 underline hover:text-amber-200">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
